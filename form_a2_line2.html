<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shift Assignment – Line 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root{
    --bg:#f4f6fa;--white:#fff;--border:#e2e6f0;
    --blue:#1d4ed8;--blue-light:#eff4ff;--blue-mid:#dbeafe;
    --green:#15803d;--green-light:#f0fdf4;
    --text:#111827;--dim:#6b7280;--dimmer:#9ca3af;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans','Noto Sans SC',sans-serif;
    --r:10px;--sh:0 1px 4px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

  .header{background:#b45309;padding:16px 20px;position:sticky;top:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;}
  .header-left h1{font-size:16px;font-weight:700;color:#fff;}
  .header-left p{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
  .lang-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
    border-radius:20px;display:flex;overflow:hidden;}
  .lang-btn{padding:5px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);
    cursor:pointer;border:none;background:transparent;font-family:var(--sans);transition:all .15s;}
  .lang-btn.active{background:#fff;color:var(--blue);border-radius:20px;}

  .body{padding:16px 16px 48px;max-width:520px;margin:0 auto;}

  .card{background:#fff;border-radius:var(--r);border:1px solid var(--border);
    box-shadow:var(--sh);padding:16px;margin-bottom:12px;}

  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .meta-grid .full{grid-column:1/-1;}
  .fg{display:flex;flex-direction:column;gap:5px;}
  .fl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);}
  .field{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
    padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--text);
    outline:none;width:100%;transition:border-color .15s;-webkit-appearance:none;}
  .field:focus{border-color:#b45309;background:#fff;}
  .field::placeholder{color:var(--dimmer);}

  .shift-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .shift-pill{border:2px solid var(--border);border-radius:8px;padding:10px 8px;
    text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);
    -webkit-tap-highlight-color:transparent;}
  .shift-pill .si{font-size:20px;display:block;margin-bottom:3px;}
  .shift-pill .sn{font-size:13px;font-weight:700;}
  .shift-pill .st{font-size:10px;color:var(--dim);font-family:var(--mono);}
  .sel-day{border-color:#f59e0b!important;background:#fffbeb!important;}
  .sel-night{border-color:#6366f1!important;background:#eef2ff!important;}

  .line-header{background:#fffbeb;border:1px solid #fef3c7;
    border-radius:var(--r) var(--r) 0 0;padding:10px 16px;
    display:flex;align-items:center;gap:8px;}
  .line-badge{font-family:var(--mono);font-size:11px;font-weight:700;background:var(--blue);
    color:#fff;padding:3px 9px;border-radius:5px;}
  .line-title{font-size:13px;font-weight:700;color:#b45309;}
  .machine-block{background:#fff;border:1px solid var(--border);border-top:none;
    border-radius:0 0 var(--r) var(--r);padding:14px 16px;margin-bottom:12px;}
  .machine-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .machine-row:last-child{margin-bottom:0;}
  .mtag{font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 8px;
    border-radius:6px;background:#fef3c7;color:#b45309;
    min-width:88px;text-align:center;flex-shrink:0;}

  .submit-btn{width:100%;padding:16px;margin-top:8px;background:var(--blue);color:#fff;
    border:none;border-radius:var(--r);font-family:var(--sans);font-size:15px;font-weight:700;
    cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  BTNACTIVE{transform:scale(.98);}

  #success{display:none;min-height:100vh;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;padding:40px 24px;}
  #success.show{display:flex;}
  .ok-circle{width:72px;height:72px;border-radius:50%;background:var(--green-light);
    border:2px solid var(--green);display:flex;align-items:center;justify-content:center;
    font-size:32px;margin-bottom:16px;}
  #success h2{font-size:20px;font-weight:800;margin-bottom:6px;}
  #success p{color:var(--dim);font-size:13px;margin-bottom:2px;}
  .sum-table{background:#fff;border:1px solid var(--border);border-radius:var(--r);
    margin:18px 0;width:100%;max-width:340px;overflow:hidden;}
  .sum-row{display:flex;justify-content:space-between;padding:9px 14px;
    border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .sum-row:last-child{border-bottom:none;}
  .sum-row .sk{color:var(--dim);white-space:nowrap;}
  .sum-row .sv{font-weight:600;font-size:12px;font-family:var(--mono);text-align:right;}
  .again-btn{padding:12px 28px;border:1.5px solid var(--border);border-radius:var(--r);
    background:#fff;font-family:var(--sans);font-size:14px;font-weight:600;
    cursor:pointer;color:var(--text);margin-top:4px;}

  #loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);
    backdrop-filter:blur(3px);align-items:center;justify-content:center;
    flex-direction:column;z-index:999;}
  #loading.show{display:flex;}
  .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);
    border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading span{font-size:14px;color:var(--dim);}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><span data-en="Submitting…" data-zh="提交中…">Submitting…</span></div>

<div id="main">
  <div class="header">
    <div class="header-left">
      <h1 data-en="Shift Assignment — Line 2" data-zh="班次登记 — 一线">Shift Assignment — Line 2</h1>
      <p data-en="Team Leader · Fill once per shift" data-zh="班组长 · 每班填写一次">Team Leader · Fill once per shift</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中文</button>
    </div>
  </div>

  <div class="body">
    <!-- META -->
    <div class="card">
      <div class="meta-grid">
        <div class="fg">
          <label class="fl" data-en="Team Leader" data-zh="班组长">Team Leader</label>
          <input class="field" id="tl-name" type="text"
            data-ph-en="Name" data-ph-zh="姓名" placeholder="Name" autocomplete="off">
        </div>
        <div class="fg">
          <label class="fl" data-en="Date" data-zh="日期">Date</label>
          <input class="field" id="tl-date" type="date">
        </div>
        <div class="fg full">
          <label class="fl" data-en="Shift" data-zh="班次">Shift</label>
          <div class="shift-row">
            <div class="shift-pill" id="sp-day" onclick="pickShift('day')">
              <span class="si">🌅</span>
              <span class="sn" data-en="Day" data-zh="早班">Day</span>
              <span class="st">06:00–18:00</span>
            </div>
            <div class="shift-pill" id="sp-night" onclick="pickShift('night')">
              <span class="si">🌙</span>
              <span class="sn" data-en="Night" data-zh="夜班">Night</span>
              <span class="st">18:00–06:00</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- LINE 2 MACHINES -->
    <div class="line-header">
      <span class="line-badge">LINE 2</span>
      <span class="line-title" data-en="Stringers 2.1 – 2.6" data-zh="焊接机 2.1 – 2.6">Stringers 2.1 – 2.6</span>
    </div>
    <div class="machine-block" id="machine-grid"></div>

    <button class="submit-btn" onclick="submitForm()" data-en="✓ Submit" data-zh="✓ 提交">✓ Submit</button>
  </div>
</div>

<div id="success">
  <div class="ok-circle">✓</div>
  <h2 data-en="Submitted!" data-zh="提交成功！">Submitted!</h2>
  <p data-en="Shift assignment saved." data-zh="班次记录已保存。">Shift assignment saved.</p>
  <div class="sum-table" id="summary"></div>
  <button class="again-btn" onclick="resetForm()" data-en="← New Entry" data-zh="← 重新填写">← New Entry</button>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwy1kieESA4BlsN9sAI2N0b-v53sYN-20MLNVIKdHh0kIYcORD1eJmdMx3CbJTRn39ucw/exec";
const MACHINES = ['2.1','2.2','2.3','2.4','2.5','2.6'];

// Build machine rows
const grid = document.getElementById('machine-grid');
MACHINES.forEach(id => {
  const row = document.createElement('div');
  row.className = 'machine-row';
  row.innerHTML = `<div class="mtag">Stringer-${id}</div>
    <input class="field" id="op-${id}" type="text"
      data-ph-en="Operator name" data-ph-zh="操作工姓名"
      placeholder="Operator name" autocomplete="off">`;
  grid.appendChild(row);
});

document.getElementById('tl-date').value = new Date().toISOString().split('T')[0];

// ── Language ──
let lang = 'en';
function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = l === 'en' ? el.dataset.en : el.dataset.zh;
  });
  document.querySelectorAll('[data-ph-en]').forEach(el => {
    el.placeholder = l === 'en' ? el.dataset.phEn : el.dataset.phZh;
  });
  document.getElementById('btn-en').className = 'lang-btn' + (l === 'en' ? ' active' : '');
  document.getElementById('btn-zh').className = 'lang-btn' + (l === 'zh' ? ' active' : '');
}
document.addEventListener('DOMContentLoaded', () => setLang('en'));

// ── Shift ──
let shift = null;
function pickShift(s) {
  shift = s;
  document.getElementById('sp-day').className   = 'shift-pill' + (s === 'day'   ? ' sel-day'   : '');
  document.getElementById('sp-night').className = 'shift-pill' + (s === 'night' ? ' sel-night' : '');
}

// ── Submit ──
async function submitForm() {
  const name = document.getElementById('tl-name').value.trim();
  const date = document.getElementById('tl-date').value;
  if (!name)  { alert(lang==='zh' ? '请填写班组长姓名' : 'Please enter Team Leader name'); return; }
  if (!shift) { alert(lang==='zh' ? '请选择班次' : 'Please select a shift'); return; }

  const machines = MACHINES.map(id => ({
    machine: 'Stringer-' + id,
    line: 'Line 2',
    operator: document.getElementById('op-' + id).value.trim()
  }));

  const payload = {
    formType: 'shift_assignment',
    line: 'Line 2',
    teamLeader: name, date,
    shift: shift === 'day' ? 'Day / 早班' : 'Night / 夜班',
    timestamp: new Date().toLocaleString('en-US', {hour12:false}),
    machines
  };

  document.getElementById('loading').classList.add('show');
  try {
      await fetch(SHEET_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    showSuccess(name, date, shift, machines);
  } catch(e) {
    alert(lang==='zh' ? '提交失败，请重试' : 'Submission failed, please retry');
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function showSuccess(name, date, shift, machines) {
  document.getElementById('main').style.display = 'none';
  document.getElementById('success').classList.add('show');
  const filled = machines.filter(m => m.operator).length;
  const rows = lang === 'zh'
    ? [['班组长', name], ['日期', date], ['班次', shift==='day'?'早班':'夜班'], ['已填机台', filled+' / 6']]
    : [['Team Leader', name], ['Date', date], ['Shift', shift==='day'?'Day':'Night'], ['Filled', filled+' / 6']];
  document.getElementById('summary').innerHTML = rows
    .map(([k,v]) => `<div class="sum-row"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join('');
}

function resetForm() {
  document.getElementById('main').style.display = 'block';
  document.getElementById('success').classList.remove('show');
  document.getElementById('tl-name').value = '';
  document.getElementById('tl-date').value = new Date().toISOString().split('T')[0];
  MACHINES.forEach(id => document.getElementById('op-' + id).value = '');
  shift = null;
  document.getElementById('sp-day').className = 'shift-pill';
  document.getElementById('sp-night').className = 'shift-pill';
}
</script>
</body>
</html>
